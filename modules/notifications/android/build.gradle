plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.kidpointsnotifications'
version = '1.0.0'

android {
  namespace "expo.modules.kidpointsnotifications"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }
}

dependencies {
  implementation 'androidx.core:core-ktx:1.17.0'
  implementation 'com.facebook.react:react-android'
  implementation project(':native-log-sync')
}
